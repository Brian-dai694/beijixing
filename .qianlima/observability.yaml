observability:
  version: 1
  purpose: Track workflow components, experience, decisions, files, and cost.

dimensions:
  component_observability:
    description: Track whether each workflow component worked.
    metrics:
      - workflow_started
      - workflow_completed
      - data_source_available
      - required_fields_present
      - report_generated
      - trace_generated
      - usage_record_generated

  experience_observability:
    description: Track reusable lessons from user feedback and repeated runs.
    metrics:
      - user_edits_count
      - accepted_suggestions_count
      - rejected_suggestions_count
      - repeated_issue_count
      - template_change_count
      - rule_change_count

  decision_observability:
    description: Track whether recommendations have visible evidence.
    metrics:
      - recommendations_with_data_source
      - recommendations_with_rule_id
      - recommendations_with_risk_level
      - recommendations_requiring_confirmation

  file_observability:
    description: Track source files, generated files, and cross-file calls.
    metrics:
      - source_files_registered
      - output_files_registered
      - templates_used
      - overwrite_attempts

  cost_observability:
    description: Track model, tool, and workflow cost.
    metrics:
      - model_calls
      - input_tokens
      - output_tokens
      - estimated_input_tokens
      - estimated_output_tokens
      - input_token_delta
      - output_token_delta
      - total_token_delta
      - input_token_delta_pct
      - total_token_delta_pct
      - tool_calls
      - rows_read
      - currency
      - estimated_cost
      - model_cost
      - tool_cost
      - tool_cost_currency
      - billed_cost
      - billed_cost_currency
      - billing_cost_delta
      - billing_cost_delta_pct
      - outcome_units
      - cost_per_outcome
      - baseline_cost
      - cost_over_baseline_ratio
      - estimated_savings
      - estimated_savings_rate_pct
      - cost_limit
      - cost_status
      - savings_source
      - continue_or_stop

  context_observability:
    description: Track context usage, compression level, and safety reserve.
    metrics:
      - estimated_context_tokens
      - context_budget_ratio
      - safety_reserve_tokens
      - files_read_full
      - files_summarized
      - files_indexed
      - compression_level_used
      - source_reload_count

  latency_observability:
    description: Attribute task delay so optimization targets the actual bottleneck.
    metrics:
      - startup_ms
      - routing_ms
      - context_load_ms
      - tool_ms
      - model_ms
      - first_useful_output_ms
      - total_duration_seconds

  runtime_observability:
    description: Track budget, sandbox, and state-machine enforcement for each task run.
    metrics:
      - context_level
      - current_state
      - budget_exhaustion_reason
      - tool_budget_ratio
      - step_budget_ratio
      - sandbox_denial_count
      - confirmation_wait_count

  model_observability:
    description: Track provider-specific model behavior and adapter choice.
    metrics:
      - provider
      - model
      - tokenizer_id
      - tokenizer_version
      - workload_type
      - token_measurement_method
      - token_measurement_reference
      - adapter_profile
      - total_window_tokens
      - max_output_tokens
      - cache_hit_tokens
      - cache_miss_tokens
      - reasoning_mode_enabled
      - reserve_ratio_used

  qianlima_eval_observability:
    description: Track MiniAppBench-style run evaluation quality.
    metrics:
      - eval_report_generated
      - eval_weighted_score
      - eval_status
      - intent_alignment_score
      - evidence_static_quality_score
      - dynamic_execution_quality_score
      - cost_savings_efficiency_score
      - risk_control_score
      - hard_block_count
      - pending_verification_count
      - next_optimization_count
      - private_shadow_case_pass_rate

default_trace_fields:
  - run_id
  - workflow_id
  - scenario
  - data_sources
  - source_files
  - output_files
  - rules_applied
  - decisions
  - confirmations_required
  - validation_result
  - usage_summary
  - context_budget_summary
  - model_adapter_summary
  - qianlima_eval_summary
  - status
