task_card:
  id: knowledge_digest
  name: 资料消化
  plain_language_trigger:
    - 帮我整理这批资料
    - 先把这些文档变成摘要
    - 帮我看完这些材料
    - 先帮我压成行动项
  when_to_use: 资料很多、内容长、来源杂，先整理成可读摘要、问题清单和行动项。
  user_needs_to_provide:
    - 文档、PDF、网页链接或会议材料
    - 希望关注的主题，可选
    - 是否要输出行动项，可选
  agent_will_do:
    - 先用 NotebookLM 或同类资料消化方式整理原始材料
    - 提炼摘要、问题、行动项和待验证点
    - 把结果归档到千里马工作区
    - 必要时转换成后续 workflow
  output:
    type: markdown_report
    template: templates/knowledge-digest_template.md
    trace_template: run-traces/RUN_TRACE_TEMPLATE.yaml
  must_include:
    - 资料摘要
    - 关键问题
    - 行动项
    - 待验证项
    - 下一步
    - 数据来源
    - 使用情况
  input_checklist:
    - 确认资料路径、网页链接或用户粘贴内容可读取
    - 标记资料类型：网页、PDF、表格、会议纪要、内部文档或其他
    - 判断是否触发 context-policy.yaml 的压缩规则
    - 记录无法读取、过期或需要二次确认的资料
  validation:
    checklist: evaluations/knowledge_digest_checklist.yaml
    required_evaluation_tasks:
      - eval_knowledge_digest_basic
      - eval_knowledge_digest_harness_v1
      - eval_context_budget_safety
  risk_control:
    default_risk_level: low
    external_send_requires_confirmation: true
    write_back_allowed: false
  forbidden_actions:
    - 直接把摘要当最终结论
    - 自动写回外部系统
