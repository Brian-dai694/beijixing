name: Beijixing Verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Startup skeleton validation
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File ".\start-qianlima.ps1"

      - name: Strict public-safe verification
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File ".\.qianlima\scripts\verify-qianlima.ps1"

      - name: Evolution policy regression
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File ".\.qianlima\scripts\test-evolution-policy.ps1"

      - name: Enterprise offline regression
        shell: powershell
        run: |
          $enterpriseRoot = Get-Item -LiteralPath '.\editions\enterprise'
          $tests = Get-ChildItem -LiteralPath $enterpriseRoot.FullName -Filter 'test-*.ps1' -File |
            Where-Object { $_.Name -ne 'test-enterprise-environment.ps1' }
          foreach ($test in $tests) {
            Write-Host ("Running " + $test.Name)
            & powershell.exe -NoProfile -ExecutionPolicy Bypass -File $test.FullName -PassThru
            if ($LASTEXITCODE -ne 0) { throw ("Enterprise regression failed: " + $test.Name) }
          }

      - name: Model fusion regression
        shell: powershell
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-model-fusion.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Model fusion regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-fusion-governance-loop.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Fusion governance loop regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-evidence-market.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Evidence market regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-shadow-fusion-runtime.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Shadow fusion runtime regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-employee-agent-collaboration.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Employee Agent collaboration regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-shadow-candidate-dispatch-gate.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Shadow candidate dispatch gate regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-blindspot-learning.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Blindspot learning regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-governed-collaboration-fan-in.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Governed collaboration fan-in regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-enterprise-data-admission.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Enterprise data admission regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-skill-intake-gate.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Skill Intake Gate regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-improvement-governance-pipeline.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Improvement governance pipeline regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-capability-execution-classes.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Capability execution class regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-visible-execution-contract.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Visible execution contract regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-enterprise-collaboration-scale-gate.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Enterprise collaboration scale gate regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-enterprise-collaboration-outcome.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Enterprise collaboration outcome regression failed.' }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File '.\.qianlima\scripts\test-enterprise-collaboration-revocation.ps1' -PassThru
          if ($LASTEXITCODE -ne 0) { throw 'Enterprise collaboration revocation regression failed.' }

      - name: Runtime checks
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File ".\.qianlima\scripts\invoke-runtime-check.ps1" -Phase SessionStart -WorkflowId competitor_comparison
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          powershell -NoProfile -ExecutionPolicy Bypass -File ".\.qianlima\scripts\invoke-runtime-check.ps1" -Phase BeforeToolUse -Action change_bid -Confirmed
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          powershell -NoProfile -ExecutionPolicy Bypass -File ".\.qianlima\scripts\invoke-runtime-check.ps1" -Phase BeforeToolUse -Action change_bid
          if ($LASTEXITCODE -eq 0) {
            throw "Unconfirmed high-risk action was not blocked."
          }

          Write-Host "Unconfirmed high-risk action was blocked as expected."
          $global:LASTEXITCODE = 0

      - name: Pester unit tests
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.0 -ErrorAction Stop
          Write-Host ("Pester " + (Get-Module Pester).Version)
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = '.\tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  verify-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell 7
        shell: bash
        run: |
          if ! command -v pwsh >/dev/null 2>&1; then
            brew install --cask powershell
          fi
          pwsh --version

      - name: Startup via pwsh -File (index + validation)
        shell: bash
        run: |
          pwsh -NoProfile -File ./start-qianlima.ps1
          test -f .qianlima/WORKSPACE_INDEX.md
          test -f .qianlima/workspace-index.json

      - name: Startup via bash wrapper
        shell: bash
        run: |
          chmod +x ./start-qianlima.sh
          ./start-qianlima.sh -SkipValidation

      - name: Strict public-safe verification (pwsh)
        shell: bash
        run: |
          pwsh -NoProfile -File ./.qianlima/scripts/verify-qianlima.ps1

      - name: Evolution policy regression (pwsh)
        shell: bash
        run: |
          pwsh -NoProfile -File ./.qianlima/scripts/test-evolution-policy.ps1

      - name: Core runtime regressions (pwsh)
        shell: bash
        run: |
          pwsh -NoProfile -File ./.qianlima/scripts/test-context-fast.ps1
          pwsh -NoProfile -File ./.qianlima/scripts/test-command-safety.ps1
          pwsh -NoProfile -File ./.qianlima/scripts/test-protected-invariants.ps1

      - name: A2A and delegation regressions (pwsh)
        shell: bash
        run: |
          pwsh -NoProfile -File ./.qianlima/scripts/test-broker-contracts.ps1
          pwsh -NoProfile -File ./.qianlima/scripts/test-sub-delegation.ps1
          pwsh -NoProfile -File ./.qianlima/scripts/test-a2a-dispatch-gate-regression.ps1
          pwsh -NoProfile -File ./.qianlima/scripts/test-a2a-local-mock.ps1

      - name: Currency-safe cost ledger regression (pwsh)
        shell: bash
        run: |
          pwsh -NoProfile -File ./.qianlima/scripts/record-qianlima-usage.ps1 -WorkflowId ci_cost -RunId ci-cost-usd -EstimatedCost 1 -Currency USD
          pwsh -NoProfile -File ./.qianlima/scripts/record-qianlima-usage.ps1 -WorkflowId ci_cost -RunId ci-cost-cny -EstimatedCost 7 -Currency CNY
          pwsh -NoProfile -File ./.qianlima/scripts/new-qianlima-cost-dashboard.ps1 -Days 1 -OutputPath ./.qianlima/reports/ci-cost-dashboard.md
          grep -q 'USD 1.000000' ./.qianlima/reports/ci-cost-dashboard.md
          grep -q 'CNY 7.000000' ./.qianlima/reports/ci-cost-dashboard.md
          ! grep -q 'Last 1 days cost | .*8.000000' ./.qianlima/reports/ci-cost-dashboard.md

      - name: Enterprise launcher fails closed without deployment prerequisites
        shell: bash
        run: |
          enterprise_dir="./editions/enterprise"
          test -f "$enterprise_dir/start-enterprise.sh"
          chmod +x "$enterprise_dir/start-enterprise.sh"
          set +e
          output="$(bash "$enterprise_dir/start-enterprise.sh" -SkipValidation -Quiet 2>&1)"
          status=$?
          set -e
          test "$status" -ne 0
          printf '%s\n' "$output" | grep -q 'Enterprise managed environment is not ready'
