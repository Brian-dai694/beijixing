enterprise_controls:
  identity: external_sso_or_local_enterprise_identity
  authorization: rbac_plus_task_scoped_grant
  continuous_trust: trust-policy.yaml
  governance_adapter: governance-adapter.yaml
  event_contract: event-contract.json
  approvals: human_approval_for_l4_and_production_promotion
  audit: append_only_trace_and_central_sink_optional
  agent_registry: governed_allowlist
  memory: task_scoped_memory_broker
  evolution: candidate_replay_simulation_and_human_promotion
  tenant_isolation: required
  direct_agent_to_agent: deny
  task_classification: enterprise_L0_L4_with_organizational_impact
  organization_onboarding: guided_beginner_setup
  data_connections: broker_only_configured_connectors
  task_views: business_outcome_failure_core_issue_handling
  commerce_outcomes: profitability_title_main_image_five_bullets_long_description
  commerce_lifecycle: selection_listing_fulfillment_traffic_conversion_after_sales_review
  lingxing_integration: reserved_mcp_readonly_first
  mcp_integration: vendor_neutral_broker_governed_registry
  obsidian_integration: reserved_local_knowledge_connector_readonly_first
  approved_direct_mcp: local_connector_enforced_short_lived_session
  employee_management: joiner_mover_leaver_append_only
  role_management: governance_plus_business_roles_scoped_and_expiring
  user_access_authority: task_grant_only
  artifact_organization: business_department_risk_month_task_type
  operational_learning: review_to_candidate_then_replay_verify_and_human_promote
  api_agent_deployment: E1_E2_E3_E4_selected_by_two_questions
  model_collaboration: evidence_first_l3_only_l4_human_required
  api_access: broker_only_field_allowlist_secret_ref_only_sanitized_verification
  professional_tools: tool_risk_profiles_explicit_resources_evidence_receipts_revocable_sessions
  fusion_loop: claim_pack_receipt_revoke_freeze_shadow_only
  evidence_market: disagreement_budget_signal_no_vote_authority
  shadow_runtime: internal_component_governed_fan_in_only
  employee_agent_collaboration: manager_fan_in_no_self_review_no_shared_grant
  real_model_shadow_trial: preflight_only_dispatch_disabled
  blindspot_learning: sanitized_append_only_routing_only_no_permission_change
  collaboration_fan_in: contract_lineage_independence_then_shadow_receipt
  collaboration_entrypoint: governed_collaboration_fan_in
  data_admission: L0_policy_L1_metadata_L2_sanitized_L3_jit_reference
  external_agent_knowledge_search: deny_evidence_pack_only
  hils_runtime_dependency: none_governance_pattern_only
  skill_intake_gate: install_update_only_offline_static_first
  skill_intake_startup_path: never
  oneskills_integration: proposal_only_fastmcp_http_disabled_executor_L4_runner_candidate
  open_interpreter_integration: discover_only_plan_gate_execute_disabled
  declarative_change_plan: offline_desired_state_diff_plan_preview_execute_disabled
  business_service_boundary: UI_MCP_scheduler_to_service_repository_approved_adapter
  scheduled_agent_identity: independent_service_identity_task_grant_and_budget
  runtime_self_check: startup_background_L4_preflight_non_destructive
  evidence_retrieval: authorization_before_hot_metadata_recall_then_cold_evidence
  improvement_entrypoint: evaluation_card_replay_verify_human_canary_monitor
  automatic_improvement_release: deny
  capability_routing: deterministic_tool_then_on_demand_knowledge_then_independent_delegation
  ordinary_chat_runtime_loading: deny
  child_grant_inheritance: deny
  visible_execution: structured_events_without_prompts_reasoning_or_credentials
  collaboration_capacity: task_employee_department_organization_quota_and_backpressure
  capacity_grants_authority: false
  collaboration_revocation: whole_grant_set_before_next_action
  outcome_states: completed_blocked_failed_needs_human_frozen_cancelled
  blocked_is_failed: false

runtime_defaults:
  mode: plan
  dry_run: true
  network: deny_by_default
  web_access: deny
  erp_access: deny
  file_export: deny
  host_workspace_mount: deny
  secret_mode: secret_ref_only
  real_execution: disabled_until_attestation
  external_a2a: disabled
  environment_gate: required_before_enterprise_start

platform:
  windows: Docker Desktop with WSL2 backend preferred; Hyper-V is an implementation fallback
  macos: Docker Desktop with the native Linux virtualization backend
  linux: Docker Engine or an approved isolated Runner
  user_configuration: hide_platform_backend_details
