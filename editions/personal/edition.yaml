edition:
  id: personal
  version: 2.7.8
  product_profile: personal-local-first
  shared_core_root: ../..
  do_not_fork_harness: true

shared_contracts:
  north_star: ../../.qianlima/specifications/north-star-protocol.json
  runtime_policy: ../../.qianlima/agent-runtime-policy.yaml
  harness_boundary: ../../.qianlima/harness-boundary.json
  memory_learning_boundary: ../../.qianlima/specifications/edition-memory-learning-boundary.json
  personal_experience: ../../.qianlima/specifications/personal-experience-policy.json
  personal_skill_install: ../../.qianlima/specifications/personal-skill-install-policy.json
  skill_intake: ../../.qianlima/skill-intake-contract.json

personal_controls:
  identity: local_user
  organization_rbac: not_applicable
  device_scope: current_device
  memory_scope: private_account_task_relevant_only
  preference_learning: explicit_correction_repetition_and_user_confirmation
  skill_install: scan_then_user_confirm_then_restricted_install
  external_agent_data: public_or_explicitly_selected_sanitized_only
  permissions: task_scoped_and_revocable
  L4: explicit_user_confirmation_snapshot_and_rollback

runtime_defaults:
  mode: personal
  low_risk_governance_visibility: quiet
  network: deny_by_default
  write: deny_by_default
  external_a2a: disabled
  secret_mode: secret_ref_only
  automatic_permission_expansion: false
  background_tasks: disabled_until_user_starts
  collaboration_default: single_agent
  delegation: only_for_independent_goal_evidence_or_review
  enterprise_queue_and_multi_tenant_services: not_loaded
  memory_control: user_visible_editable_deletable_and_revertible
